<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descarga protegida · Propuesta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:#0b1020;color:#fff;-webkit-font-smoothing:antialiased}
.gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:420px;width:100%;background:#141a2e;border:1px solid #1f2742;border-radius:16px;padding:40px 32px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.brand{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#7a85a3;margin-bottom:24px}
h1{font-size:22px;line-height:1.3;margin-bottom:8px;letter-spacing:-0.01em}
p{font-size:14px;color:#9aa3bd;margin-bottom:28px;line-height:1.55}
input{width:100%;padding:14px 16px;background:#0b1020;border:1px solid #2a3356;border-radius:10px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border .15s}
input:focus{border-color:#4a7cff}
button{width:100%;margin-top:12px;padding:14px;background:#4a7cff;border:0;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
button:hover{background:#3a6cef}
button:disabled{opacity:.5;cursor:wait}
.err{color:#ff7b7b;font-size:13px;margin-top:12px;min-height:18px}
.ok{color:#6ed38e;font-size:13px;margin-top:12px;min-height:18px}
.foot{font-size:11px;color:#5a6480;margin-top:24px;letter-spacing:.04em}
.links{margin-top:16px;font-size:13px}
.links a{color:#6a8dff;text-decoration:none}
.links a:hover{text-decoration:underline}
</style>
</head><body>
<div class="gate">
  <form class="card" onsubmit="return unlock(event)">
    <div class="brand">Capgemini Invent · Mapfre</div>
    <h1>Descargar propuesta (Word)</h1>
    <p>Introduce la contraseña para descifrar y descargar el archivo .docx.</p>
    <input id="pw" type="password" autocomplete="off" autofocus placeholder="Contraseña">
    <button id="btn" type="submit">Descifrar y descargar</button>
    <div class="err" id="err"></div>
    <div class="ok" id="ok"></div>
    <div class="links"><a href="./">← Ver propuesta en web</a></div>
    <div class="foot">Borrador interno · No redistribuir</div>
  </form>
</div>
<script>
async function unlock(e) {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  const btn = document.getElementById("btn");
  const err = document.getElementById("err");
  const ok = document.getElementById("ok");
  err.textContent = ""; ok.textContent = "";
  btn.disabled = true; btn.textContent = "Descargando blob...";
  try {
    const res = await fetch("./propuesta.enc");
    if (!res.ok) throw new Error("fetch:" + res.status);
    const buf = new Uint8Array(await res.arrayBuffer());
    btn.textContent = "Descifrando...";
    const iter = new DataView(buf.buffer, 0, 4).getUint32(0, true);
    const salt = buf.slice(4, 20);
    const iv = buf.slice(20, 32);
    const ct = buf.slice(32);
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt, iterations:iter, hash:"SHA-256"},
      km, {name:"AES-GCM", length:256}, false, ["decrypt"]
    );
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
    const blob = new Blob([pt], {type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "propuesta-mapfre-nps.docx";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    ok.textContent = "Descarga iniciada.";
    btn.textContent = "Descargar de nuevo";
    btn.disabled = false;
  } catch (ex) {
    err.textContent = ex.message.startsWith("fetch") ? "No se encuentra propuesta.enc" : "Contraseña incorrecta.";
    btn.disabled = false; btn.textContent = "Descifrar y descargar";
    document.getElementById("pw").select();
  }
  return false;
}
</script>
</body></html>
