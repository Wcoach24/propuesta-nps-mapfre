<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta · NPS Predictivo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:#0b1020;color:#fff;-webkit-font-smoothing:antialiased}
.gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:420px;width:100%;background:#141a2e;border:1px solid #1f2742;border-radius:16px;padding:40px 32px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.brand{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#7a85a3;margin-bottom:24px}
h1{font-size:22px;line-height:1.3;margin-bottom:8px;letter-spacing:-0.01em}
p{font-size:14px;color:#9aa3bd;margin-bottom:28px;line-height:1.55}
input{width:100%;padding:14px 16px;background:#0b1020;border:1px solid #2a3356;border-radius:10px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border .15s}
input:focus{border-color:#4a7cff}
button{width:100%;margin-top:12px;padding:14px;background:#4a7cff;border:0;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
button:hover{background:#3a6cef}
button:disabled{opacity:.5;cursor:wait}
.err{color:#ff7b7b;font-size:13px;margin-top:12px;min-height:18px}
.foot{font-size:11px;color:#5a6480;margin-top:24px;letter-spacing:.04em}
#content{display:none}
</style>
</head><body>
<div class="gate" id="gate">
  <form class="card" onsubmit="return unlock(event)">
    <div class="brand">Capgemini Invent · Mapfre</div>
    <h1>Documento protegido</h1>
    <p>Introduce la contraseña para ver la propuesta.</p>
    <input id="pw" type="password" autocomplete="off" autofocus placeholder="Contraseña">
    <button id="btn" type="submit">Desbloquear</button>
    <div class="err" id="err"></div>
    <div class="foot">Borrador interno · No redistribuir</div>
  </form>
</div>
<div id="content"></div>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function derive(pw, salt, iter) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]
  );
}
async function unlock(e) {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  const btn = document.getElementById("btn");
  const err = document.getElementById("err");
  err.textContent = "";
  btn.disabled = true; btn.textContent = "Descifrando...";
  try {
    const salt = b64d(P.s), iv = b64d(P.i), ct = b64d(P.c);
    const key = await derive(pw, salt, P.n);
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
    const ds = new DecompressionStream("gzip");
    const stream = new Blob([pt]).stream().pipeThrough(ds);
    const html = await new Response(stream).text();
    document.getElementById("gate").style.display = "none";
    document.open(); document.write(html); document.close();
  } catch (ex) {
    err.textContent = "Contraseña incorrecta.";
    btn.disabled = false; btn.textContent = "Desbloquear";
    document.getElementById("pw").select();
  }
  return false;
}
